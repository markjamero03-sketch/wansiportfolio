<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<fieldset>
<Legend style="color:blue;"><h2>Request for proposal</h2></Legend>
<table>
    <tr>
<td align="right"><label>Company:</label><input type="text" name="yc"></td> 
    </tr>
    <tr>
<td align="right"><label>Email</label><input type="text" name="em"></td> 
    </tr>
    <tr>
<td align="right"><label>Username:</label><input type="text" name="user"></td>
    </tr>
    <tr>
<td align="right"><label>Password</label><input type="text" name="pass"></td>
    </tr>
</table>
    <tr>
<td><label>Your Business:</label><textarea></textarea></td>
    </tr>
<table
    <tr>
<td align="left"><label>Company Size:</label><input type="radio"  id="less" value="less" name="10"><label>less than 10</label></td>
</tr>
    <tr>
<td align="right"><input type="radio" id="small" value="small" name="11 - 50"><label>11 to 50</label></td>
</tr>
    <tr>
<td align="right"><input type="radio" id="medium" value="medium" name="50 - 200"><label>50 to 200</label></td>
    </tr>
    <tr>
<td align="right"><input type="radio" id="large" value="large" name="200+"><label>over 200</label></td>
    </tr>
</table>
Services:
<label><input type="checkbox" />Brand Identity</label>
<label><input type="checkbox" />New Website</label>
<label><input type="checkbox" />Web Redesign</label><br>

Timeline:
<select>
    <optgroup label="Select one">
    <option>1-2 weeks</option>
    <option>3-6 weeks</option>
    <option>1-2 months</option>
</select><br>
<button>Send to dev/design</button>
</fieldset>
</body>
</html>
