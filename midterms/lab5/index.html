<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Layout</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:40px;
}

/* Top Survey Section */
.survey-container{
    margin-bottom:60px;
}

.survey-container input{
    display:block;
    margin-bottom:8px;
    padding:5px;
    width:200px;
}

.survey-container button{
    padding:5px 10px;
    margin-right:5px;
}

/* Google Section */
.google-box{
    margin-top:20px;
    width:500px;
    background:#e9e9e9;
    padding:40px;
    text-align:center;
}

.google-logo{
    font-size:60px;
    font-weight:bold;
    letter-spacing:1px;
}

.google-logo span:nth-child(1){color:#4e73df}
.google-logo span:nth-child(2){color:#EA4335;}
.google-logo span:nth-child(3){color:#FBBC05;}
.google-logo span:nth-child(4){color:#4285F4;}
.google-logo span:nth-child(5){color:#34A853;}
.google-logo span:nth-child(6){color:#EA4335;}

.search-bar{
    margin-top:20px;
    padding:10px;
    width:80%;
    border-radius:20px;
    border:1px solid #ccc;
    align-items: center;
}

/* Bottom Forms Section */
.flex-container{
    display:flex;
    gap:50px;
    margin-top:50px;
}

.card{
    background:#e9e9e9;
    padding:30px;
    width:350px;
    border-radius:5px;
}

.card input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.signup-btn{
    width:100%;
    padding:10px;
    border:none;
    color:white;
    font-weight:bold;
    border-radius:5px;
    background:linear-gradient(to right, #4e73df, #1c4fd8);
    cursor:pointer;
}

.ride-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.ride-btns{
    display:flex;
    gap:10px;
}

.request-btn{
    background:black;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
}

.schedule-btn{
    background:#cfcfcf;
    border:none;
    padding:10px 15px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- Survey Section -->
<div class="survey-container">
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">

    <p>Thanks for chatting with our customer support.<br>
    Would you like to take our quick survey?</p>

    <button>Yes</button>
    <button>No</button>

    <div class="google-box">
        <div class="google-logo">
            <span>G</span><span>o</span><span>o</span>
            <span>g</span><span>l</span><span>e</span>
        </div>
        <div align="center" class=".search-bar">
        <input type="text" class="search-bar" placeholder="Search Google or type a URL">
        </div>
    </div>
</div>

<!-- Bottom Forms -->
<div class="flex-container">

    <!-- Sign Up Card -->
    <div class="card">
        <div style="display:flex; gap:10px;">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="First name">
        </div>
        <input type="email" placeholder="Email">
        <button class="signup-btn">Sign Up</button>
    </div>

    <!-- Ride Request Card -->
    <div class="card">
        <div class="ride-title">Request a ride now</div>
        <input type="text" placeholder="Enter pickup location">
        <input type="text" placeholder="Enter destination">
        <div class="ride-btns">
            <button class="request-btn">Request now</button>
            <button class="schedule-btn">Schedule for later</button>
        </div>
    </div>

</div>

</body>
</html>
