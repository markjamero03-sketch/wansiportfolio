<!-- PART 2 RESPONSIVE FLEX LAYOUT -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Flex Layout</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      padding:10px;
    }

    .box{
      color:white;
      text-align:center;
      padding:40px;
      font-size:20px;
    }

    .header{
      background:#3498db;
      width:100%;
    }

    .nav{
      background:#2ecc71;
      width:100%;
    }

    .main{
      background:#e67e22;
      flex:3;
      min-height:300px;
    }

    .sidebar{
      background:#9b59b6;
      flex:1;
      min-height:300px;
    }

    .footer{
      background:#34495e;
      width:100%;
    }

    /* BREAKPOINT 1 */
    /* 800px and above */

    @media (min-width:800px){

      .container{
        flex-direction:row;
      }

      .main{
        flex:3;
      }

      .sidebar{
        flex:1;
      }
    }

    /* BREAKPOINT 2 */
    /* 400px and below */

    @media (max-width:400px){

      .container{
        flex-direction:column;
      }

      .main,
      .sidebar{
        width:100%;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="box header">Header</div>

    <div class="box nav">Navigation</div>

    <div class="box main">Main Content</div>

    <div class="box sidebar">Sidebar</div>

    <div class="box footer">Footer</div>

  </div>

</body>
</html>
