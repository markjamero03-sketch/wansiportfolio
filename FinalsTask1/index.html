<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finals Task 2 – CSS Positions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 3000px;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }

    /* ── CLOSE BUTTON (position: absolute, top-right of page) ── */
    #close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    /* ── FIXED DIV (bottom-right, 320×180) ── */
    #fixed-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      height: 180px;
      background: #888;
      border-radius: 6px;
      z-index: 998;
    }

    /* ── PRODUCT CARDS SECTION ── */
    .cards-section {
      padding: 80px 40px 40px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    /* position: relative container, display: inline-block */
    .product-card {
      position: relative;
      display: inline-block;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      background: #d6d6d6;
    }

    .product-card img {
      display: block;
      width: 220px;
      height: 260px;
      object-fit: cover;
    }

    /* ── BADGE (position: absolute inside relative) ── */
    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #111;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-radius: 3px;
    }

    /* ── ADD TO CART (only on card-2, absolute bottom) ── */
    .add-to-cart {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .add-to-cart:hover {
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- TASK: Close Button – position: absolute, top-right -->
  <button id="close-btn">X</button>

  <!-- TASK: Fixed div – bottom-right, 320×180 -->
  <div id="fixed-panel"></div>

  <!-- TASK: Product cards using position: relative + absolute -->
  <div class="cards-section">

    <!-- Card 1: badge only (15e style) -->
    <div class="product-card">
      <img src="shirt.png" alt="T-shirt" />
      <span class="badge">20% OFF</span>
    </div>

    <!-- Card 2: badge + Add to Cart button (15f style) -->
    <div class="product-card">
      <img src="shirt.png" alt="T-shirt" />
      <span class="badge">20% OFF</span>
      <button class="add-to-cart">Add to Cart</button>
    </div>

  </div>

</body>
</html>
