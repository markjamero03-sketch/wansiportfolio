<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Task part 1</title>
<link rel="stylesheet" href="style.css">
<style>             
body {
  font-family: Arial;
}

.box {
  display: flex;
  margin-bottom: 20px;
}

/* General item style */
.item {
  background: lightgray;
  border: 1px solid gray;
  padding: 10px;
}

/* 12a */
.a .item:first-child {
  width: 200px;
  background: lightblue;

}
.a .item:last-child {
  width: 75px;
    background: lightcoral;
}

/* 12b */
.b .item {
  width: 50px;
  background: lightcoral;
}
.b .grow {
  flex: 1; 
  background: lightblue
}

/* 12c */
.c {
  justify-content: space-between;
}
.c .item{
    background: lightcoral;
}

/* 12d */
.d {
  height: 50px;
  border: 2px solid gray;
  align-items: center;
  justify-content: space-between;
}

.d .item {
  background: lightcoral;
}
</style>
</head>
<body>

<h3>12a</h3>
<div class="box a">
  <div class="item">200px</div>
  <div class="item">75px</div>
</div>

<h3>12b</h3>
<div class="box b">
  <div class="item">item1</div>
  <div class="item grow">item2</div>
  <div class="item">item3</div>
</div>

<h3>12c</h3>
<div class="box c">
  <div class="item">item1</div>
  <div class="item">item2</div>
  <div class="item">item3</div>
  <div class="item">item4</div>
</div>

<h3>12d</h3>
<div class="box d">
  <div class="item">item1</div>
  <div class="item">item2</div>
</div>

</body>
</html>
